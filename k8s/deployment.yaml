# ZCOP Platform - Kubernetes Deployment Configuration

apiVersion: apps/v1
kind: Deployment
metadata:
  name: zcop-frontend
  labels:
    app: zcop-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zcop-frontend
  template:
    metadata:
      labels:
        app: zcop-frontend
    spec:
      containers:
      - name: frontend
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        - name: frontend-assets
          mountPath: /usr/share/nginx/html
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
      - name: frontend-assets
        emptyDir: {}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zcop-backend
  labels:
    app: zcop-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zcop-backend
  template:
    metadata:
      labels:
        app: zcop-backend
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '3000'
        prometheus.io/path: '/metrics'
    spec:
      containers:
      - name: backend
        image: node:18-alpine
        workingDir: /app
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: zcop-secrets
              key: jwt-secret
        - name: DB_HOST
          value: "zcop-postgres"
        - name: DB_PORT
          value: "5432"
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: zcop-secrets
              key: db-username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: zcop-secrets
              key: db-password
        - name: DB_NAME
          value: "zcop_db"
        - name: NEO4J_HOST
          value: "zcop-neo4j"
        - name: NEO4J_PORT
          value: "7687"
        - name: NEO4J_USERNAME
          value: "neo4j"
        - name: NEO4J_PASSWORD
          valueFrom:
            secretKeyRef:
              name: zcop-secrets
              key: neo4j-password
        - name: REDIS_HOST
          value: "zcop-redis"
        - name: REDIS_PORT
          value: "6379"
        - name: QDRANT_HOST
          value: "zcop-qdrant"
        - name: QDRANT_PORT
          value: "6334"
        - name: QDRANT_API_KEY
          valueFrom:
            secretKeyRef:
              name: zcop-secrets
              key: qdrant-api-key
        ports:
        - containerPort: 3000
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
        startupProbe:
          httpGet:
            path: /api/health
            port: 3000
          failureThreshold: 30
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: zcop-frontend-service
spec:
  selector:
    app: zcop-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: zcop-backend-service
spec:
  selector:
    app: zcop-backend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zcop-ingress
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - zcop.yourdomain.com
    secretName: zcop-tls
  rules:
  - host: zcop.yourdomain.com
    http:
      paths:
      - path: /()
        pathType: Prefix
        backend:
          service:
            name: zcop-frontend-service
            port:
              number: 80
      - path: /api(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: zcop-backend-service
            port:
              number: 3000
      - path: /graphql(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: zcop-backend-service
            port:
              number: 3000